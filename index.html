<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Daily Cash Requirement</title>
<style>
body{font-family:Arial,sans-serif;background:#0D1B2A;color:#fff;margin:0;padding:16px;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.w{width:380px;border-radius:12px;overflow:hidden;border:1px solid #2a3f5a;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
.hdr{background:#1B2A4A;padding:16px 20px;border-bottom:2px solid #C9A84C;}
.hdr h2{font-size:11px;color:#C9A84C;letter-spacing:2px;text-transform:uppercase;margin:0 0 4px;}
.hdr h1{font-size:16px;margin:0 0 2px;}
.hdr p{font-size:11px;color:#7f9ab5;margin:0;}
.main{background:#162236;padding:20px;text-align:center;border-bottom:1px solid #2a3f5a;}
.lbl{font-size:9px;letter-spacing:2px;color:#7f9ab5;text-transform:uppercase;margin-bottom:6px;}
.big{font-size:48px;font-weight:800;letter-spacing:-2px;}
.big.lo{color:#2ECC71;}.big.md{color:#F39C12;}.big.hi{color:#E74C3C;}
.sub{font-size:10px;color:#7f9ab5;margin-top:4px;}
.row{background:#0f1e30;padding:10px 20px;display:flex;align-items:center;justify-content:center;gap:8px;border-bottom:1px solid #2a3f5a;}
.fp{text-align:center;}.fv{font-size:14px;font-weight:700;}.fv.g{color:#C9A84C;}.fv.r{color:#E74C3C;}.fv.gr{color:#2ECC71;}
.fl{font-size:8px;color:#4a6080;text-transform:uppercase;}.fo{font-size:18px;color:#3a5070;}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 20px;background:#162236;border-bottom:1px solid #2a3f5a;}
.card{background:#1B2A4A;border-radius:8px;padding:12px;}
.card.p{border-left:3px solid #E74C3C;}.card.b{border-left:3px solid #E67E22;}.card.i{border-left:3px solid #2ECC71;grid-column:1/-1;}
.cl{font-size:9px;letter-spacing:1px;color:#7f9ab5;text-transform:uppercase;margin-bottom:4px;}
.ca{font-size:20px;font-weight:800;}.ca.g{color:#2ECC71;}
.cs{font-size:9px;color:#7f9ab5;margin-top:2px;}
.ctx{background:#1B2A4A;padding:10px 20px;border-bottom:1px solid #2a3f5a;}
.ci{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid #0D1B2A;}
.ci:last-child{border-bottom:none;}
.ct{flex:1;}.cti{font-size:10px;font-weight:700;color:#C9A84C;margin-bottom:2px;}
.cde{font-size:9px;color:#7f9ab5;line-height:1.45;}
.bdg{font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;white-space:nowrap;}
.bdg.r{background:rgba(231,76,60,.2);color:#E74C3C;}.bdg.o{background:rgba(243,156,18,.2);color:#F39C12;}
.bdg.g{background:rgba(46,204,113,.2);color:#2ECC71;}.bdg.gr{background:rgba(127,154,181,.15);color:#7f9ab5;}
.ft{background:#0D1B2A;padding:8px 20px;display:flex;justify-content:space-between;font-size:8px;color:#2a3f5a;}
.src{color:#2ECC71;}
</style>
</head>
<body>
<div class="w">
  <div class="hdr">
    <h2>Pawn Shop - Manager Dashboard</h2>
    <h1 id="htitle">Daily Cash Requirement</h1>
    <p id="hdate"></p>
  </div>
  <div class="main">
    <div class="lbl">Cash Needed to Start the Day</div>
    <div class="big" id="main">--</div>
    <div class="sub" id="msub"></div>
  </div>
  <div class="row">
    <div class="fp"><div class="fv g" id="ff">--</div><div class="fl">Float</div></div>
    <div class="fo">+</div>
    <div class="fp"><div class="fv r" id="fo">--</div><div class="fl">Cash Out</div></div>
    <div class="fo">-</div>
    <div class="fp"><div class="fv gr" id="fi">--</div><div class="fl">Cash In</div></div>
    <div class="fo">=</div>
    <div class="fp"><div class="fv g" id="ft">--</div><div class="fl">Start With</div></div>
  </div>
  <div class="cards">
    <div class="card p"><div class="cl">Pawns Out</div><div class="ca" id="pa">--</div><div class="cs" id="ps"></div></div>
    <div class="card b"><div class="cl">Buys Out</div><div class="ca" id="ba">--</div><div class="cs" id="bs"></div></div>
    <div class="card i"><div class="cl">Cash Inflow (15% of total - rest is card)</div><div class="ca g" id="ia">--</div></div>
  </div>
  <div class="ctx">
    <div class="ci"><div class="ct"><div class="cti" id="dt">--</div><div class="cde" id="dd">--</div></div><div class="bdg" id="db">--</div></div>
    <div class="ci"><div class="ct"><div class="cti" id="pt">--</div><div class="cde" id="pd">--</div></div><div class="bdg" id="pb">--</div></div>
    <div class="ci"><div class="ct"><div class="cti" id="st">--</div><div class="cde" id="sd">--</div></div><div class="bdg" id="sb">--</div></div>
    <div class="ci"><div class="ct"><div class="cti">Recommendation</div><div class="cde" id="rec">--</div></div></div>
  </div>
  <div class="ft"><span id="ftime"></span><span class="src" id="fsrc">Loading...</span></div>
</div>
<script>
var D = {
  dow: {
    Monday:    {pawns:4803,buys:1807,cashOut:6523,cashIn:1216,net:5307,minFloat:3000,totalStart:8300,worstMorning:8454,pawnsN:16.0,buysN:4.8,bp:{start:6400,mid:7400,p15:6800,late:7100,end:6200}},
    Tuesday:   {pawns:3767,buys:1051,cashOut:4756,cashIn:813, net:3943,minFloat:2000,totalStart:5900,worstMorning:9460,pawnsN:13.6,buysN:3.6,bp:{start:4700,mid:4900,p15:5100,late:4900,end:5400}},
    Wednesday: {pawns:3323,buys:1626,cashOut:4882,cashIn:1067,net:3815,minFloat:2000,totalStart:5800,worstMorning:6229,pawnsN:11.3,buysN:3.9,bp:{start:5500,mid:5000,p15:4200,late:4900,end:3800}},
    Thursday:  {pawns:3191,buys:1008,cashOut:4144,cashIn:1239,net:2905,minFloat:1500,totalStart:4400,worstMorning:4580,pawnsN:10.4,buysN:3.4,bp:{start:4100,mid:4000,p15:3600,late:3700,end:3200}},
    Friday:    {pawns:3749,buys:1421,cashOut:5101,cashIn:1591,net:3511,minFloat:2000,totalStart:5500,worstMorning:11380,pawnsN:12.0,buysN:3.6,bp:{start:5300,mid:4800,p15:3800,late:4700,end:3900}},
    Saturday:  {pawns:4729,buys:1619,cashOut:6265,cashIn:1422,net:4843,minFloat:2500,totalStart:7300,worstMorning:8420,pawnsN:15.2,buysN:4.3,bp:{start:5800,mid:5800,p15:5500,late:6100,end:6200}},
    Sunday:    {pawns:0,buys:0,cashOut:0,cashIn:0,net:0,minFloat:0,totalStart:0,worstMorning:0,pawnsN:0,buysN:0,bp:{start:0,mid:0,p15:0,late:0,end:0}}
  },
  mo: {1:2522,2:1944,3:2157,4:2407,5:2283,6:2778,7:2492,8:2568,9:2968,10:3106,11:2821,12:2905},
  moNames: ['January','February','March','April','May','June','July','August','September','October','November','December'],
  ppLabel: {
    start:'Start of month (days 1-5): customers get paid and redeem. Less cash out.',
    mid:'Mid-month (days 6-14): slowest redemptions, heaviest pawn days. Most cash needed.',
    p15:'15th payday window (days 15-17): mild redemption bump from semi-monthly payroll.',
    late:'Late month (days 18-26): moderate cash demand approaching month-end.',
    end:'End of month (days 27-31): strong redemptions as customers get paid.'
  },
  dowNote: {
    Monday:'Monday is the heaviest cash-out day (~16 loans). Plan for maximum starting cash.',
    Tuesday:'Tuesday is above average for cash demand. Card payments dominate inflows.',
    Wednesday:'Wednesday has strong buy activity but 85% of inflows arrive by card.',
    Thursday:'Thursday is the lightest cash-out day. Best day to replenish from the bank.',
    Friday:'Friday has the highest inflows but most pay by card. Cash out is still significant.',
    Saturday:'Saturday is the 2nd busiest pawn day (~15 loans). High foot traffic.',
    Sunday:'Store is CLOSED. Online extensions and layaways only - no cash out needed.'
  }
};

function f(n){return ‘$’+Math.round(n).toLocaleString(‘en-US’);}

function pp(day){
if(day<=5) return ‘start’;
if(day<=14) return ‘mid’;
if(day<=17) return ‘p15’;
if(day<=26) return ‘late’;
return ‘end’;
}

function render(){
var now = new Date();
var days = [‘Sunday’,‘Monday’,‘Tuesday’,‘Wednesday’,‘Thursday’,‘Friday’,‘Saturday’];
var dow = days[now.getDay()];
var dom = now.getDate();
var mon = now.getMonth()+1;
var period = pp(dom);
var d = D.dow[dow];
var sun = (dow===‘Sunday’);
var adj = (!sun && d.bp && d.bp[period]) ? d.bp[period] : d.totalStart;

document.getElementById(‘htitle’).textContent = dow+’ - Cash Requirement’;
document.getElementById(‘hdate’).textContent = now.toLocaleDateString(‘en-US’,{weekday:‘long’,year:‘numeric’,month:‘long’,day:‘numeric’});

var mel = document.getElementById(‘main’);
mel.textContent = sun ? ‘$0’ : f(adj);
mel.className = ’big ’+(adj>=7000?‘hi’:adj>=5000?‘md’:‘lo’);
document.getElementById(‘msub’).textContent = sun?‘Store closed - no cash needed’:’Float + projected cash out for day ’+dom;

document.getElementById(‘ff’).textContent = f(d.minFloat);
document.getElementById(‘fo’).textContent = f(d.cashOut);
document.getElementById(‘fi’).textContent = f(d.cashIn);
document.getElementById(‘ft’).textContent = sun?’$0’:f(adj);

document.getElementById(‘pa’).textContent = f(d.pawns);
document.getElementById(‘ps’).textContent = d.pawnsN>0?’~’+d.pawnsN+’ loans projected’:‘Closed’;
document.getElementById(‘ba’).textContent = f(d.buys);
document.getElementById(‘bs’).textContent = d.buysN>0?’~’+d.buysN+’ purchases projected’:‘Closed’;
document.getElementById(‘ia’).textContent = f(d.cashIn);

var ppLabels = {start:‘Start of Month’,mid:‘Mid-Month’,p15:‘15th Payday’,late:‘Late Month’,end:‘End of Month’};
document.getElementById(‘dt’).textContent = dow+’ Pattern’;
document.getElementById(‘dd’).textContent = D.dowNote[dow];
var db = document.getElementById(‘db’);
if(sun){db.textContent=‘CLOSED’;db.className=‘bdg gr’;}
else if(adj>=7000){db.textContent=‘Heavy Day’;db.className=‘bdg r’;}
else if(adj>=5500){db.textContent=‘Moderate’;db.className=‘bdg o’;}
else{db.textContent=‘Lighter Day’;db.className=‘bdg g’;}

document.getElementById(‘pt’).textContent = ppLabels[period]+’ - Day ‘+dom;
document.getElementById(‘pd’).textContent = D.ppLabel[period];
var diff = adj - d.totalStart;
var pb = document.getElementById(‘pb’);
if(Math.abs(diff)<200){pb.textContent=‘Average’;pb.className=‘bdg gr’;}
else if(diff>0){pb.textContent=’+$’+Math.abs(diff).toLocaleString()+’ vs avg’;pb.className=‘bdg r’;}
else{pb.textContent=’-$’+Math.abs(diff).toLocaleString()+’ vs avg’;pb.className=‘bdg g’;}

var mn = D.mo[mon];
var moName = D.moNames[mon-1];
document.getElementById(‘st’).textContent = moName+’ Seasonal Note’;
var sd = document.getElementById(‘sd’);
var sb = document.getElementById(‘sb’);
if(mn>1500){sd.textContent=moName+’ is a high cash-demand month (avg $’+mn.toLocaleString()+’/day net).’;sb.textContent=‘Peak’;sb.className=‘bdg r’;}
else if(mn>1000){sd.textContent=moName+’ is above average (avg $’+mn.toLocaleString()+’/day net).’;sb.textContent=‘Above Avg’;sb.className=‘bdg o’;}
else{sd.textContent=moName+’ is a typical month (avg $’+mn.toLocaleString()+’/day net).’;sb.textContent=‘Normal’;sb.className=‘bdg gr’;}

document.getElementById(‘rec’).textContent = sun?‘No action needed.’:‘Open with ‘+f(adj)+’ in the drawer. Float covers ‘+f(d.minFloat)+’ for worst-case morning. Worst ever ‘+dow+’ morning: ‘+f(d.worstMorning)+’.’;
document.getElementById(‘ftime’).textContent = ’Day ‘+dom+’ of month | ’+now.toLocaleTimeString(‘en-US’,{hour:‘numeric’,minute:‘2-digit’});
}

render();
document.getElementById(‘fsrc’).textContent = ‘Cached data’;
document.getElementById(‘fsrc’).style.color = ‘#7f9ab5’;

var mn = new Date(); mn.setDate(mn.getDate()+1); mn.setHours(0,0,0,0);
setTimeout(function(){render();setInterval(render,86400000);}, mn-new Date());
</script>

</body>
</html>
